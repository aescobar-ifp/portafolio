<head>

    <style>
        body {
            font-size: 3rem;
            font-family: helvetica;
        }
    </style>
</head>
<body>

 <script type ="text/javascript" language ="JavaScript">
    var sortir = confirm( "segur que vols tancar l'aplicació?" );
    if (sortir==true) {
        document.write("tancant l'aplicació...");
        document.body.style.backgroundColor="#333" ;
        document.body.style.color="#fff" ;

    }
    else {
        document.write("continuant l'aplicació...");
        document.body.style.backgroundColor="#555" ;
        document.body.style.color="#0fffff" ;
    }



 </script>

    
</body>
</html>
